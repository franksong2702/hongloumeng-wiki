<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850">
  <defs>
    <style>
      .title{font:700 28px -apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC',sans-serif;fill:#2b2118}
      .note{font:14px -apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC',sans-serif;fill:#6d5a45}
      .label{font:17px -apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC',sans-serif;fill:#2b2118}
      .small{font:13px -apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC',sans-serif;fill:#5b4b3a}
      .building{fill:#fff8ec;stroke:#8f6b3f;stroke-width:2;rx:12;ry:12}
      .main{fill:#fff0cc;stroke:#b36b00;stroke-width:3;rx:14;ry:14}
      .garden{fill:#f3fbef;stroke:#6a9b57;stroke-width:3;stroke-dasharray:8 5;rx:28;ry:28}
      .water{fill:none;stroke:#5aa6d6;stroke-width:16;stroke-linecap:round;stroke-linejoin:round;opacity:.55}
      .water2{fill:none;stroke:#2586bf;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:8 6}
      .axis{stroke:#b55a4a;stroke-width:2;stroke-dasharray:8 8}
      .path{stroke:#8c7a64;stroke-width:2;stroke-dasharray:4 7;fill:none}
      .mountain{fill:#dce8d2;stroke:#789461;stroke-width:2}
      .bridge{stroke:#9b5d2e;stroke-width:8;stroke-linecap:round}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="850" fill="#fbf7ef"/>
  <text x="600" y="45" text-anchor="middle" class="title">大观园空间布局阅读示意图</text>
  <text x="600" y="72" text-anchor="middle" class="note">非定本复原；根据第17、18、23、40、41、74回和现代空间研究整理，用于阅读定位</text>

  <text x="70" y="80" class="label">北 ↑</text>
  <line x1="82" y1="98" x2="82" y2="150" stroke="#2b2118" stroke-width="2"/>
  <polygon points="82,88 72,108 92,108" fill="#2b2118"/>

  <rect x="105" y="105" width="990" height="665" class="garden"/>
  <text x="130" y="135" class="small">大观园边界：荣宁二府园地连属挪就而成，平面复原历来有多种方案</text>

  <!-- central axis -->
  <line x1="600" y1="745" x2="600" y2="125" class="axis"/>
  <text x="615" y="170" class="small">省亲/正殿中轴</text>

  <!-- water system -->
  <path d="M215 595 C340 535, 420 610, 515 575 C610 535, 710 560, 825 535 C940 505, 955 405, 835 365 C705 320, 600 350, 535 300 C475 255, 415 220, 330 255" class="water"/>
  <path d="M850 520 C780 470, 715 450, 640 500 C570 545, 500 545, 420 515" class="water2"/>
  <text x="735" y="555" class="small">沁芳溪 / 水脉</text>

  <!-- mountains / screen -->
  <path d="M450 690 C490 650,540 650,575 690 C620 645,690 655,730 690 L730 725 L450 725 Z" class="mountain"/>
  <text x="590" y="710" text-anchor="middle" class="label">翠嶂</text>
  <text x="590" y="732" text-anchor="middle" class="small">入门障景，曲径通幽</text>

  <path d="M330 150 C390 105,475 115,515 170 C565 125,650 110,710 160 C765 115,835 135,870 185 L870 245 L330 245 Z" class="mountain" opacity=".75"/>
  <text x="602" y="210" text-anchor="middle" class="small">山体 / 高处景观</text>

  <!-- gate and main buildings -->
  <rect x="510" y="770" width="180" height="48" class="main"/>
  <text x="600" y="800" text-anchor="middle" class="label">正门（南）</text>

  <rect x="510" y="505" width="180" height="70" class="main"/>
  <text x="600" y="535" text-anchor="middle" class="label">省亲别墅</text>
  <text x="600" y="558" text-anchor="middle" class="small">大观楼 / 正殿组群</text>

  <line x1="535" y1="615" x2="665" y2="615" class="bridge"/>
  <rect x="540" y="585" width="120" height="44" class="building"/>
  <text x="600" y="613" text-anchor="middle" class="label">沁芳亭桥</text>

  <!-- residences -->
  <rect x="210" y="560" width="180" height="78" class="building"/>
  <text x="300" y="590" text-anchor="middle" class="label">潇湘馆</text>
  <text x="300" y="613" text-anchor="middle" class="small">林黛玉 / 紫鹃</text>

  <rect x="810" y="570" width="180" height="78" class="building"/>
  <text x="900" y="600" text-anchor="middle" class="label">怡红院</text>
  <text x="900" y="623" text-anchor="middle" class="small">贾宝玉 / 袭人 / 晴雯</text>

  <rect x="210" y="392" width="180" height="78" class="building"/>
  <text x="300" y="422" text-anchor="middle" class="label">稻香村</text>
  <text x="300" y="445" text-anchor="middle" class="small">李纨 / 贾兰</text>

  <rect x="800" y="392" width="180" height="78" class="building"/>
  <text x="890" y="422" text-anchor="middle" class="label">蘅芜苑</text>
  <text x="890" y="445" text-anchor="middle" class="small">薛宝钗 / 莺儿</text>

  <rect x="250" y="270" width="160" height="68" class="building"/>
  <text x="330" y="299" text-anchor="middle" class="label">秋爽斋</text>
  <text x="330" y="321" text-anchor="middle" class="small">贾探春</text>

  <rect x="850" y="280" width="165" height="68" class="building"/>
  <text x="932" y="309" text-anchor="middle" class="label">蓼风轩 / 暖香坞</text>
  <text x="932" y="331" text-anchor="middle" class="small">贾惜春 / 入画</text>

  <rect x="790" y="205" width="150" height="62" class="building"/>
  <text x="865" y="232" text-anchor="middle" class="label">栊翠庵</text>
  <text x="865" y="253" text-anchor="middle" class="small">妙玉</text>

  <rect x="610" y="145" width="150" height="62" class="building"/>
  <text x="685" y="172" text-anchor="middle" class="label">芦雪庵</text>
  <text x="685" y="193" text-anchor="middle" class="small">雪景联诗</text>

  <rect x="480" y="300" width="145" height="62" class="building"/>
  <text x="552" y="327" text-anchor="middle" class="label">藕香榭</text>
  <text x="552" y="348" text-anchor="middle" class="small">水榭 / 宴饮</text>

  <rect x="365" y="150" width="145" height="62" class="building"/>
  <text x="438" y="177" text-anchor="middle" class="label">凸碧堂</text>
  <text x="438" y="198" text-anchor="middle" class="small">山上 / 中秋</text>

  <rect x="520" y="100" width="150" height="62" class="building"/>
  <text x="595" y="127" text-anchor="middle" class="label">凹晶馆</text>
  <text x="595" y="148" text-anchor="middle" class="small">水边 / 联句</text>

  <rect x="145" y="245" width="145" height="62" class="building" opacity=".88"/>
  <text x="217" y="272" text-anchor="middle" class="label">紫菱洲</text>
  <text x="217" y="293" text-anchor="middle" class="small">贾迎春</text>

  <rect x="980" y="660" width="125" height="56" class="building" opacity=".7"/>
  <text x="1042" y="684" text-anchor="middle" class="label">梨香院</text>
  <text x="1042" y="704" text-anchor="middle" class="small">园外/府内边缘</text>

  <!-- paths -->
  <path d="M600 770 L600 725 C560 695,510 665,540 625 C490 610,420 600,390 598" class="path"/>
  <path d="M600 628 C690 610,755 600,810 610" class="path"/>
  <path d="M600 575 L600 500" class="path"/>
  <path d="M600 500 C500 455,410 430,390 430" class="path"/>
  <path d="M600 500 C710 455,770 430,800 430" class="path"/>
  <path d="M552 300 C610 260,650 230,685 205" class="path"/>
  <path d="M685 205 C735 220,770 230,790 235" class="path"/>

  <text x="110" y="805" class="note">图例：金色=省亲中轴/主建筑；米色=居住或游赏节点；蓝色=水系；虚线=阅读路径。方位和距离为阅读示意，非实测复原。</text>
</svg>

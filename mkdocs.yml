docs_dir: .
site_dir: ../_site
theme:
  name: material
  language: zh
  features:
  - navigation.sections
  - navigation.expand
  - navigation.top
  - navigation.tracking
  - search.highlight
  - search.share
  - search.suggest
  - content.tabs.link
  - content.code.copy
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    toggle:
      icon: material/brightness-7
      name: 切换到暗色模式
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    toggle:
      icon: material/brightness-4
      name: 切换到亮色模式
  icon:
    repo: fontawesome/brands/github
